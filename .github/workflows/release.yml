name: release

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (SemVer, optional leading v)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: baseline-release-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Pre-check workflow_dispatch version input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          raw_input_version="${{ github.event.inputs.release_version }}"
          normalized_input_version="${raw_input_version#v}"
          normalized_input_version="${normalized_input_version//[[:space:]]/}"
          if [ -z "$normalized_input_version" ]; then
            echo "workflow_dispatch requires non-empty input release_version"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: false

      - name: Install release build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/code.txt
          python -m pip install .
          python -m pip install pyinstaller==6.18.0

      - name: Build standalone binary
        run: python scripts/release/build_binary.py

      - name: Smoke check standalone binary
        run: python scripts/release/smoke_binary.py

      - name: Resolve release version
        id: resolve_release_version
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)
              raw_version="${{ github.event.release.tag_name }}"
              ;;
            workflow_dispatch)
              raw_version="${{ github.event.inputs.release_version }}"
              ;;
            *)
              echo "Unsupported event for release version resolution: ${{ github.event_name }}"
              exit 1
              ;;
          esac
          release_version="${raw_version#v}"
          release_version="${release_version//[[:space:]]/}"
          if [ -z "$release_version" ]; then
            echo "Resolved release_version is empty"
            exit 1
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Package standalone binary
        run: python scripts/release/package_binary.py --runner-os "${{ runner.os }}" --runner-arch "${{ runner.arch }}" --version "${{ steps.resolve_release_version.outputs.release_version }}"

      - name: Verify packaged artifact naming inventory
        shell: bash
        run: |
          set -euo pipefail
          expected_prefix="apidev-${{ steps.resolve_release_version.outputs.release_version }}-"
          archive_count=0
          matched_archive_path=""
          while IFS= read -r archive_path; do
            [ -n "$archive_path" ] || continue
            archive_count=$((archive_count + 1))
            matched_archive_path="$archive_path"
          done <<EOF
          $(find dist/release -maxdepth 1 -type f -name "${expected_prefix}*")
          EOF
          if [ "$archive_count" -ne 1 ]; then
            echo "Expected exactly one packaged archive with prefix ${expected_prefix}, got ${archive_count}"
            find dist/release -maxdepth 1 -type f -print
            exit 1
          fi
          archive_name="$(basename "$matched_archive_path")"
          case "$archive_name" in
            apidev-${{ steps.resolve_release_version.outputs.release_version }}-*-*.zip|apidev-${{ steps.resolve_release_version.outputs.release_version }}-*-*.tar.gz) ;;
            *)
              echo "Archive name does not match apidev-<version>-<os>-<arch> pattern: $archive_name"
              exit 1
              ;;
          esac

      - name: Capture packaged artifact metadata
        id: package_metadata
        shell: bash
        run: |
          set -euo pipefail
          archive_path="$(find dist/release -maxdepth 1 -type f -name 'apidev-*' | head -n 1)"
          if [ -z "$archive_path" ]; then
            echo "No packaged artifact found in dist/release"
            exit 1
          fi
          archive_name="$(basename "$archive_path")"
          archive_stem="${archive_name%.tar.gz}"
          archive_stem="${archive_stem%.zip}"
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "archive_stem=$archive_stem" >> "$GITHUB_OUTPUT"

      - name: Upload packaged workflow artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ${{ steps.package_metadata.outputs.archive_stem }}
          path: ${{ steps.package_metadata.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload packaged GitHub Release asset
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package_metadata.outputs.archive_path }}" --clobber

  publish-homebrew:
    name: publish-homebrew
    runs-on: macos-latest
    needs: release
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    permissions:
      contents: read
    steps:
      - name: Pre-check Homebrew tap token secret
        id: precheck_homebrew_secret
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "Missing required secret HOMEBREW_TAP_TOKEN"
            exit 1
          fi
          case "$HOMEBREW_TAP_TOKEN" in
            github_pat_*) ;;
            *)
              echo "HOMEBREW_TAP_TOKEN has unsupported format"
              exit 1
              ;;
          esac
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Publish Homebrew formula placeholder
        if: ${{ steps.precheck_homebrew_secret.outputs.ready == 'true' }}
        run: |
          echo "Homebrew publish path is enabled and secret pre-check passed."
